<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works Catalog | Jorge Sosa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#fff;color:#111;padding:2rem 1.5rem;max-width:800px;margin:0 auto}
header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid #eee}
header h1{font-size:22px;font-weight:normal;letter-spacing:0.02em}
header p{font-size:13px;color:#888;margin-top:4px}
header a{font-size:13px;color:#185FA5;text-decoration:none}
header a:hover{text-decoration:underline}
#js-catalog *{box-sizing:border-box;font-family:inherit}
#js-catalog input[type=text]{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:14px;outline:none;font-family:Georgia,serif}
#js-catalog input[type=text]:focus{border-color:#888}
#js-catalog .cat-btn{font-size:12px;padding:4px 10px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:transparent;color:#555;margin:2px}
#js-catalog .cat-btn.active{background:#222;color:#fff;border-color:#222}
#js-catalog .voice-btn{font-size:11px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:transparent;color:#555;margin:2px}
#js-catalog .voice-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
#js-catalog .inst-btn{font-size:11px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:transparent;color:#555;margin:2px}
#js-catalog .inst-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
#js-catalog .filter-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px}
#js-catalog .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
#js-catalog .results-bar{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee;padding-top:10px;margin-bottom:10px}
#js-catalog .results-count{font-size:13px;color:#888}
#js-catalog .clear-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:0}
#js-catalog .work-row{padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:background 0.1s}
#js-catalog .work-row:hover{background:#f9f9f9}
#js-catalog .work-row.open{background:#f5f5f5;border-color:#e0e0e0}
#js-catalog .work-title{font-size:14px;font-weight:600;color:#111}
#js-catalog .work-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
#js-catalog .work-year{font-size:12px;color:#aaa}
#js-catalog .work-cat{font-size:11px;padding:2px 7px;background:#f0f0f0;color:#666;border-radius:4px}
#js-catalog .work-forces{font-size:12px;color:#777;margin:3px 0 0}
#js-catalog .es-badge{font-size:10px;margin-left:6px;padding:2px 5px;background:#E1F5EE;color:#0F6E56;border-radius:4px}
#js-catalog .work-detail{margin-top:10px;padding-top:10px;border-top:1px solid #eee;display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
#js-catalog .detail-label{font-size:11px;color:#aaa}
#js-catalog .detail-val{font-size:13px;color:#333;margin:2px 0 0}
#js-catalog .empty{padding:2rem;text-align:center;color:#bbb;font-size:14px}
#js-catalog .row-header{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
#js-catalog .row-left{flex:1;min-width:0}
#js-catalog .contact-note{margin-top:2rem;padding-top:1rem;border-top:1px solid #eee;font-size:13px;color:#888;text-align:center}
#js-catalog .contact-note a{color:#185FA5;text-decoration:none}
#js-catalog .contact-note a:hover{text-decoration:underline}
</style>
</head>
<body>

<header>
  <h1>Jorge Sosa — Works Catalog</h1>
  <p>50 works · Filter by category, voice, and instrumentation &nbsp;·&nbsp; <a href="https://www.jorgesosa.com">jorgesosa.com</a></p>
</header>

<div id="js-catalog">
  <input type="text" id="jsc-search" placeholder="Search by title, instrument, ensemble...">
  <div id="jsc-cats"></div>
  <div class="filter-grid">
    <div><span class="filter-label">Voice</span><div id="jsc-voices"></div></div>
    <div><span class="filter-label">Instrument</span><div id="jsc-inst"></div></div>
  </div>
  <div class="results-bar">
    <span class="results-count" id="jsc-count"></span>
    <button class="clear-btn" id="jsc-clear" onclick="jscClear()" style="display:none">Clear all</button>
  </div>
  <div id="jsc-list"></div>
  <p class="contact-note">To inquire about scores or performances, contact <a href="mailto:jorge@jorgesosa.com">jorge@jorgesosa.com</a></p>
</div>

  {id:28,title:"I Dissent",year:2019,cat:"Orchestra",voices:[],inst:["strings","winds","brass","piano","percussion"],forces:"full orchestra",dur:"15 min",lang:"",ens:"Albany Symphony"},

  {id:35,title:"Pequeño Concierto para Corno, Guitarra, y Cuarteto de Cuerdas",year:2022,cat:"Chamber",voices:[],inst:["strings","guitar","brass"],forces:"horn, guitar, string quartet",dur:"10 min",lang:"",ens:"Borderlands Ensemble"},
  {id:36,title:"Rocola",year:2022,cat:"Chamber",voices:[],inst:["flute","clarinet","strings","piano","percussion"],forces:"flute, clarinet, violin, cello, piano, percussion",dur:"12 min",lang:"",ens:"Victory Players"},
  {id:37,title:"Dos Danzas",year:2021,cat:"Chamber",voices:[],inst:["strings","piano"],forces:"cello, piano",dur:"9 min",lang:"",ens:""},
  {id:38,title:"Cajón",year:2011,cat:"Chamber",voices:[],inst:["guitar"],forces:"guitar quartet (also for guitar trio)",dur:"7 min",lang:"",ens:"Mexico City Guitar Quartet"},
  {id:39,title:"A Well Organized Disaster",year:2012,cat:"Chamber",voices:[],inst:["brass","percussion"],forces:"trombone and percussion (also tuba and percussion)",dur:"10 min",lang:"",ens:""},
  {id:40,title:"Amado",year:2025,cat:"Solo",voices:[],inst:["strings"],forces:"cello solo",dur:"6 min",lang:"",ens:"Bryan Hayslett"},
  {id:41,title:"Reimagined Spring",year:2020,cat:"Solo",voices:[],inst:["strings"],forces:"cello solo",dur:"6 min",lang:"",ens:"Matt Haimovitz / Primavera Project"},

  {id:45,title:"Refraction I",year:2008,cat:"Electronics",voices:[],inst:["clarinet","electronics"],forces:"clarinet and electronics",dur:"15 min",lang:"",ens:""},
  {id:46,title:"Enchantment",year:2014,cat:"Electronics",voices:[],inst:["electronics"],forces:"tarogato, fixed media, live DSP",dur:"10 min",lang:"",ens:"Esther Lamneck"},
  {id:47,title:"Still Life",year:2011,cat:"Electronics",voices:[],inst:["electronics"],forces:"oboe and electronics",dur:"12 min",lang:"",ens:"Laura Medisky"},
  {id:48,title:"Elegy for the Victims of Gun Violence",year:2017,cat:"Electronics",voices:[],inst:["strings","electronics"],forces:"cello and electronics",dur:"11 min",lang:"",ens:""},
  {id:49,title:"Ghost Birds",year:2019,cat:"Electronics",voices:[],inst:["electronics"],forces:"fixed media, optional improvising ensemble",dur:"10 min",lang:"",ens:""},
  {id:50,title:"Carnaval",year:2008,cat:"Electronics",voices:[],inst:["electronics"],forces:"fixed electronic media",dur:"11 min",lang:"",ens:""}
];
const CATS=["All","Opera","Opera Shorts","Art Songs","Chamber with Voice","Choral","Orchestra","Band","Chamber","Solo","Electronics"];
const VF=["soprano","mezzo-soprano","tenor","baritone","bass","countertenor","chorus"];
const IF=["piano","guitar","strings","flute","clarinet","electronics","winds","brass","percussion","harp"];
let selCat="All",selV=[],selI=[],openId=null;
function render(){
  const q=(document.getElementById("jsc-search").value||"").toLowerCase();
  document.getElementById("jsc-cats").innerHTML=CATS.map(c=>`<button class="cat-btn${selCat===c?" active":""}" onclick="jscCat('${c}')">${c}</button>`).join("");
  document.getElementById("jsc-voices").innerHTML=VF.map(v=>`<button class="voice-btn${selV.includes(v)?" active":""}" onclick="jscV('${v}')">${v}</button>`).join("");
  document.getElementById("jsc-inst").innerHTML=IF.map(i=>`<button class="inst-btn${selI.includes(i)?" active":""}" onclick="jscI('${i}')">${i}</button>`).join("");
  const f=W.filter(w=>{
    if(selCat!=="All"&&w.cat!==selCat)return false;
    if(q&&!w.title.toLowerCase().includes(q)&&!w.forces.toLowerCase().includes(q)&&!w.ens.toLowerCase().includes(q))return false;
    if(selV.length&&!selV.some(v=>w.voices.includes(v)))return false;
    if(selI.length&&!selI.some(i=>w.inst.includes(i)))return false;
    return true;
  }).sort((a,b)=>b.year-a.year);
  document.getElementById("jsc-count").textContent=f.length+" work"+(f.length!==1?"s":"")+" found";
  document.getElementById("jsc-clear").style.display=(selCat!=="All"||selV.length||selI.length||q)?"":"none";
  document.getElementById("jsc-list").innerHTML=f.length?f.map(w=>`
    <div class="work-row${openId===w.id?" open":""}" onclick="jscOpen(${w.id})">
      <div class="row-header">
        <div class="row-left">
          <span class="work-title">${w.title}</span>
          ${w.lang&&w.lang.includes("Spanish")?'<span class="es-badge">ES</span>':""}
        </div>
        <div class="work-meta">
          <span class="work-year">${w.year}</span>
          <span class="work-cat">${w.cat}</span>
        </div>
      </div>
      <p class="work-forces">${w.forces}</p>
      ${openId===w.id?`<div class="work-detail">
        ${w.dur?`<div><div class="detail-label">Duration</div><p class="detail-val">${w.dur}</p></div>`:""}
        ${w.lang?`<div><div class="detail-label">Language</div><p class="detail-val">${w.lang}</p></div>`:""}
        ${w.ens?`<div style="grid-column:1/-1"><div class="detail-label">Ensemble / Commission</div><p class="detail-val">${w.ens}</p></div>`:""}
      </div>`:""}
    </div>`).join(""):`<div class="empty">No works match your filters.</div>`;
}
window.jscCat=c=>{selCat=c;render();}
window.jscV=v=>{selV=selV.includes(v)?selV.filter(x=>x!==v):[...selV,v];render();}
window.jscI=i=>{selI=selI.includes(i)?selI.filter(x=>x!==i):[...selI,i];render();}
window.jscOpen=id=>{openId=openId===id?null:id;render();}
window.jscClear=()=>{selCat="All";selV=[];selI=[];document.getElementById("jsc-search").value="";render();}
document.getElementById("jsc-search").addEventListener("input",render);
render();
})();
</script>
</body>
</html>
